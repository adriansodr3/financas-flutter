name: financas_pessoais
description: Controle financeiro familiar com sync em nuvem
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend / Auth / Sync
  supabase_flutter: ^2.3.4

  # Estado
  provider: ^6.1.2

  # Navegação
  go_router: ^13.2.0

  # UI
  fl_chart: ^0.67.0
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.3.3
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
